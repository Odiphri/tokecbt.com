openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Toke Schools CBT Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: students
    description: Student operations
  - name: staff
    description: Staff operations
  - name: exams
    description: Exam management
  - name: admin
    description: Admin management
  - name: questions
    description: Question management
  - name: results
    description: Results
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login for student or staff (admin auto-detected)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"

  /student/exams:
    get:
      operationId: getStudentExams
      tags: [students]
      summary: Get available exams for the logged-in student
      responses:
        "200":
          description: List of available exams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exam"

  /student/exams/{examId}:
    get:
      operationId: getStudentExam
      tags: [students]
      summary: Get exam details for student (with questions)
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exam with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamWithQuestions"

  /student/exams/{examId}/submit:
    post:
      operationId: submitExam
      tags: [students]
      summary: Submit exam answers
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitExamBody"
      responses:
        "200":
          description: Exam submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamResult"

  /student/results:
    get:
      operationId: getStudentResults
      tags: [students]
      summary: Get all results for logged-in student
      responses:
        "200":
          description: List of results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResultWithExam"

  /teacher/students:
    get:
      operationId: getTeacherStudents
      tags: [staff]
      summary: List all students (requires manage_students permission)
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentRecord"
    post:
      operationId: createTeacherStudent
      tags: [staff]
      summary: Create a new student (requires manage_students permission)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentBody"
      responses:
        "201":
          description: Student created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentRecord"

  /teacher/students/{regNumber}:
    put:
      operationId: updateTeacherStudent
      tags: [staff]
      summary: Update a student (requires manage_students permission)
      parameters:
        - name: regNumber
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentBody"
      responses:
        "200":
          description: Student updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentRecord"
    delete:
      operationId: deleteTeacherStudent
      tags: [staff]
      summary: Delete a student (requires manage_students permission)
      parameters:
        - name: regNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Student deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /teacher/exams:
    get:
      operationId: getTeacherExams
      tags: [staff]
      summary: Get all exams created by this staff member
      responses:
        "200":
          description: List of exams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamWithStats"
    post:
      operationId: createExam
      tags: [staff]
      summary: Create new exam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExamBody"
      responses:
        "201":
          description: Exam created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exam"

  /teacher/exams/{examId}:
    get:
      operationId: getTeacherExam
      tags: [staff]
      summary: Get exam details
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exam details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamWithQuestions"
    put:
      operationId: updateExam
      tags: [staff]
      summary: Update exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExamBody"
      responses:
        "200":
          description: Exam updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exam"
    delete:
      operationId: deleteExam
      tags: [staff]
      summary: Delete exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exam deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /teacher/exams/{examId}/questions:
    get:
      operationId: getExamQuestions
      tags: [questions]
      summary: Get questions for an exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: createQuestion
      tags: [questions]
      summary: Add a question to an exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionBody"
      responses:
        "201":
          description: Question created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"

  /teacher/exams/{examId}/questions/{questionId}:
    put:
      operationId: updateQuestion
      tags: [questions]
      summary: Update a question
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
        - name: questionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionBody"
      responses:
        "200":
          description: Question updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
    delete:
      operationId: deleteQuestion
      tags: [questions]
      summary: Delete a question
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
        - name: questionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Question deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /teacher/exams/{examId}/results:
    get:
      operationId: getExamResults
      tags: [results]
      summary: Get all student results for an exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResultWithStudent"

  /teacher/dashboard:
    get:
      operationId: getTeacherDashboard
      tags: [staff]
      summary: Get staff dashboard summary
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherDashboard"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin overview stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/students:
    get:
      operationId: getAdminStudents
      tags: [admin]
      summary: List all students
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentRecord"
    post:
      operationId: createAdminStudent
      tags: [admin]
      summary: Create a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentBody"
      responses:
        "201":
          description: Student created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentRecord"

  /admin/students/{regNumber}:
    get:
      operationId: getAdminStudent
      tags: [admin]
      summary: Get a student by reg number
      parameters:
        - name: regNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Student record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentRecord"
    put:
      operationId: updateAdminStudent
      tags: [admin]
      summary: Update a student
      parameters:
        - name: regNumber
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentBody"
      responses:
        "200":
          description: Student updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentRecord"
    delete:
      operationId: deleteAdminStudent
      tags: [admin]
      summary: Delete a student
      parameters:
        - name: regNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Student deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/staff:
    get:
      operationId: getAdminStaff
      tags: [admin]
      summary: List all staff
      responses:
        "200":
          description: List of staff
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffRecord"
    post:
      operationId: createAdminStaff
      tags: [admin]
      summary: Create a new staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffBody"
      responses:
        "201":
          description: Staff created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffRecord"

  /admin/staff/{staffId}:
    get:
      operationId: getAdminStaffMember
      tags: [admin]
      summary: Get a staff member by ID
      parameters:
        - name: staffId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Staff record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffRecord"
    put:
      operationId: updateAdminStaffMember
      tags: [admin]
      summary: Update a staff member
      parameters:
        - name: staffId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStaffBody"
      responses:
        "200":
          description: Staff updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffRecord"
    delete:
      operationId: deleteAdminStaffMember
      tags: [admin]
      summary: Delete a staff member
      parameters:
        - name: staffId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Staff deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/exams:
    get:
      operationId: getAdminExams
      tags: [admin]
      summary: List all exams across all staff
      responses:
        "200":
          description: List of exams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamWithStats"

  /admin/exams/{examId}:
    delete:
      operationId: deleteAdminExam
      tags: [admin]
      summary: Delete any exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exam deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    StaffPermissions:
      type: object
      properties:
        manage_exams:
          type: boolean
        view_all_exams:
          type: boolean
        view_all_results:
          type: boolean
        manage_students:
          type: boolean
      required: [manage_exams, view_all_exams, view_all_results, manage_students]

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [student, staff]
      required: [username, password, role]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        role:
          type: string
          enum: [student, staff, admin]
        name:
          type: string
          nullable: true
        isDefaultPassword:
          type: boolean
        id:
          type: string
        staffRole:
          type: string
          nullable: true
        permissions:
          $ref: "#/components/schemas/StaffPermissions"
          nullable: true
      required: [token, role, name, isDefaultPassword, id]

    ChangePasswordBody:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
      required: [currentPassword, newPassword]

    UserInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [student, staff, admin]
        class:
          type: string
          nullable: true
        isDefaultPassword:
          type: boolean
        staffRole:
          type: string
          nullable: true
        permissions:
          $ref: "#/components/schemas/StaffPermissions"
          nullable: true
      required: [id, name, role, isDefaultPassword]

    StudentRecord:
      type: object
      properties:
        regNumber:
          type: string
        name:
          type: string
        class:
          type: string
        isDefaultPassword:
          type: boolean
      required: [regNumber, name, class, isDefaultPassword]

    StaffRecord:
      type: object
      properties:
        staffId:
          type: string
        name:
          type: string
        subject:
          type: string
        staffRole:
          type: string
        permissions:
          $ref: "#/components/schemas/StaffPermissions"
      required: [staffId, name, subject, staffRole, permissions]

    CreateStudentBody:
      type: object
      properties:
        regNumber:
          type: string
        name:
          type: string
        class:
          type: string
        password:
          type: string
      required: [regNumber, name, class, password]

    UpdateStudentBody:
      type: object
      properties:
        name:
          type: string
        class:
          type: string
        password:
          type: string
          nullable: true
        resetPassword:
          type: boolean
      required: [name, class]

    CreateStaffBody:
      type: object
      properties:
        staffId:
          type: string
        name:
          type: string
        subject:
          type: string
        staffRole:
          type: string
        permissions:
          $ref: "#/components/schemas/StaffPermissions"
        password:
          type: string
      required: [staffId, name, subject, staffRole, permissions, password]

    UpdateStaffBody:
      type: object
      properties:
        name:
          type: string
        subject:
          type: string
        staffRole:
          type: string
        permissions:
          $ref: "#/components/schemas/StaffPermissions"
        password:
          type: string
          nullable: true
      required: [name, subject, staffRole, permissions]

    AdminStats:
      type: object
      properties:
        totalStudents:
          type: integer
        totalStaff:
          type: integer
        totalExams:
          type: integer
        totalResults:
          type: integer
      required: [totalStudents, totalStaff, totalExams, totalResults]

    Exam:
      type: object
      properties:
        id:
          type: integer
        subject:
          type: string
        class:
          type: string
        durationMinutes:
          type: integer
        startTime:
          type: string
          nullable: true
        endTime:
          type: string
          nullable: true
        createdBy:
          type: string
        questionCount:
          type: integer
      required: [id, subject, class, durationMinutes, createdBy, questionCount]

    ExamWithStats:
      type: object
      properties:
        id:
          type: integer
        subject:
          type: string
        class:
          type: string
        durationMinutes:
          type: integer
        startTime:
          type: string
          nullable: true
        endTime:
          type: string
          nullable: true
        createdBy:
          type: string
        questionCount:
          type: integer
        attemptCount:
          type: integer
        averageScore:
          type: number
          nullable: true
      required: [id, subject, class, durationMinutes, createdBy, questionCount, attemptCount]

    Question:
      type: object
      properties:
        id:
          type: integer
        examId:
          type: integer
        questionText:
          type: string
        optionA:
          type: string
        optionB:
          type: string
        optionC:
          type: string
        optionD:
          type: string
        correctOption:
          type: string
          enum: [A, B, C, D]
      required: [id, examId, questionText, optionA, optionB, optionC, optionD, correctOption]

    ExamWithQuestions:
      type: object
      properties:
        id:
          type: integer
        subject:
          type: string
        class:
          type: string
        durationMinutes:
          type: integer
        startTime:
          type: string
          nullable: true
        endTime:
          type: string
          nullable: true
        createdBy:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"
      required: [id, subject, class, durationMinutes, createdBy, questions]

    CreateExamBody:
      type: object
      properties:
        subject:
          type: string
        class:
          type: string
        durationMinutes:
          type: integer
        startTime:
          type: string
          nullable: true
        endTime:
          type: string
          nullable: true
      required: [subject, class, durationMinutes]

    CreateQuestionBody:
      type: object
      properties:
        questionText:
          type: string
        optionA:
          type: string
        optionB:
          type: string
        optionC:
          type: string
        optionD:
          type: string
        correctOption:
          type: string
          enum: [A, B, C, D]
      required: [questionText, optionA, optionB, optionC, optionD, correctOption]

    SubmitExamBody:
      type: object
      properties:
        answers:
          type: object
          additionalProperties:
            type: string
      required: [answers]

    ExamResult:
      type: object
      properties:
        id:
          type: integer
        score:
          type: integer
        total:
          type: integer
        percentage:
          type: number
        grade:
          type: string
        submittedAt:
          type: string
      required: [id, score, total, percentage, grade, submittedAt]

    ResultWithExam:
      type: object
      properties:
        id:
          type: integer
        examId:
          type: integer
        subject:
          type: string
        class:
          type: string
        score:
          type: integer
        total:
          type: integer
        percentage:
          type: number
        grade:
          type: string
        submittedAt:
          type: string
      required: [id, examId, subject, class, score, total, percentage, grade, submittedAt]

    ResultWithStudent:
      type: object
      properties:
        id:
          type: integer
        studentReg:
          type: string
        studentName:
          type: string
        studentClass:
          type: string
        score:
          type: integer
        total:
          type: integer
        percentage:
          type: number
        grade:
          type: string
        submittedAt:
          type: string
      required: [id, studentReg, studentName, studentClass, score, total, percentage, grade, submittedAt]

    TeacherDashboard:
      type: object
      properties:
        totalExams:
          type: integer
        totalQuestions:
          type: integer
        totalAttempts:
          type: integer
        averageScore:
          type: number
          nullable: true
        recentResults:
          type: array
          items:
            $ref: "#/components/schemas/ResultWithStudent"
      required: [totalExams, totalQuestions, totalAttempts, recentResults]
