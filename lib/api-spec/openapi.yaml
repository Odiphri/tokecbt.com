openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Toke Schools CBT Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: students
    description: Student operations
  - name: staff
    description: Staff operations
  - name: exams
    description: Exam management
  - name: admin
    description: Admin management
  - name: questions
    description: Question management
  - name: results
    description: Results
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login for student or staff (admin auto-detected)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password (works for all roles)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"

  /auth/profile-picture:
    patch:
      operationId: updateProfilePicture
      tags: [auth]
      summary: Update profile picture (base64 data URL)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfilePictureBody"
      responses:
        "200":
          description: Profile picture updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/name:
    patch:
      operationId: updateName
      tags: [auth]
      summary: Update display name (staff and admin only; students must request)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNameBody"
      responses:
        "200":
          description: Name updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /student/exams:
    get:
      operationId: getStudentExams
      tags: [students]
      summary: Get available exams for the logged-in student
      responses:
        "200":
          description: List of available exams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exam"

  /student/exams/{examId}:
    get:
      operationId: getStudentExam
      tags: [students]
      summary: Get exam details for student (with questions)
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exam with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamWithQuestions"

  /student/exams/{examId}/submit:
    post:
      operationId: submitExam
      tags: [students]
      summary: Submit exam answers
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitExamBody"
      responses:
        "200":
          description: Exam submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamResult"

  /student/results:
    get:
      operationId: getStudentResults
      tags: [students]
      summary: Get all results for logged-in student
      responses:
        "200":
          description: List of results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResultWithExam"

  /student/requests:
    get:
      operationId: getMyRequests
      tags: [students]
      summary: Get all requests submitted by the logged-in student
      responses:
        "200":
          description: List of requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RequestRecord"
    post:
      operationId: createRequest
      tags: [students]
      summary: Submit a new request (name change or role change)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRequestBody"
      responses:
        "201":
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestRecord"

  /teacher/students:
    get:
      operationId: getTeacherStudents
      tags: [staff]
      summary: List all students (requires manage_students permission)
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentRecord"
    post:
      operationId: createTeacherStudent
      tags: [staff]
      summary: Create a new student (requires manage_students permission)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentBody"
      responses:
        "201":
          description: Student created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentRecord"

  /teacher/class-students:
    get:
      operationId: getClassStudents
      tags: [staff]
      summary: Get students in the teacher's assigned class (class teacher only)
      responses:
        "200":
          description: List of students in assigned class
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentRecord"

  /teacher/students/{regNumber}/promote:
    post:
      operationId: promoteStudent
      tags: [staff]
      summary: Promote a student to the next class level
      parameters:
        - name: regNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Student promoted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentRecord"

  /teacher/students/{regNumber}/demote:
    post:
      operationId: demoteStudent
      tags: [staff]
      summary: Demote a student to the previous class level
      parameters:
        - name: regNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Student demoted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentRecord"

  /teacher/students/{regNumber}:
    put:
      operationId: updateTeacherStudent
      tags: [staff]
      summary: Update a student (requires manage_students permission)
      parameters:
        - name: regNumber
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentBody"
      responses:
        "200":
          description: Student updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentRecord"
    delete:
      operationId: deleteTeacherStudent
      tags: [staff]
      summary: Delete a student (requires manage_students permission)
      parameters:
        - name: regNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Student deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /teacher/exams:
    get:
      operationId: getTeacherExams
      tags: [staff]
      summary: Get all exams created by this staff member
      responses:
        "200":
          description: List of exams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamWithStats"
    post:
      operationId: createExam
      tags: [staff]
      summary: Create new exam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExamBody"
      responses:
        "201":
          description: Exam created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exam"

  /teacher/exams/{examId}/toggle-results:
    patch:
      operationId: toggleExamResults
      tags: [staff]
      summary: Enable or disable result visibility for an exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleExamResultsBody"
      responses:
        "200":
          description: Results visibility updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /teacher/exams/{examId}:
    get:
      operationId: getTeacherExam
      tags: [staff]
      summary: Get exam details
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exam details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamWithQuestions"
    put:
      operationId: updateExam
      tags: [staff]
      summary: Update exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExamBody"
      responses:
        "200":
          description: Exam updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exam"
    delete:
      operationId: deleteExam
      tags: [staff]
      summary: Delete exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exam deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /teacher/exams/{examId}/questions:
    get:
      operationId: getExamQuestions
      tags: [questions]
      summary: Get questions for an exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: createQuestion
      tags: [questions]
      summary: Add a question to an exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionBody"
      responses:
        "201":
          description: Question created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"

  /teacher/exams/{examId}/questions/{questionId}:
    put:
      operationId: updateQuestion
      tags: [questions]
      summary: Update a question
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
        - name: questionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionBody"
      responses:
        "200":
          description: Question updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
    delete:
      operationId: deleteQuestion
      tags: [questions]
      summary: Delete a question
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
        - name: questionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Question deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /teacher/exams/{examId}/results/{resultId}:
    delete:
      operationId: deleteExamResult
      tags: [staff]
      summary: Remove a student's result from an exam, making it available to retake
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
        - name: resultId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Result removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /teacher/exams/{examId}/results:
    get:
      operationId: getExamResults
      tags: [results]
      summary: Get all student results for an exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResultWithStudent"

  /teacher/dashboard:
    get:
      operationId: getTeacherDashboard
      tags: [staff]
      summary: Get staff dashboard summary
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherDashboard"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin overview stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/students:
    get:
      operationId: getAdminStudents
      tags: [admin]
      summary: List all students
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentRecord"
    post:
      operationId: createAdminStudent
      tags: [admin]
      summary: Create a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentBody"
      responses:
        "201":
          description: Student created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentRecord"

  /admin/students/{regNumber}:
    get:
      operationId: getAdminStudent
      tags: [admin]
      summary: Get a student by reg number
      parameters:
        - name: regNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Student record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentRecord"
    put:
      operationId: updateAdminStudent
      tags: [admin]
      summary: Update a student
      parameters:
        - name: regNumber
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentBody"
      responses:
        "200":
          description: Student updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentRecord"
    delete:
      operationId: deleteAdminStudent
      tags: [admin]
      summary: Delete a student
      parameters:
        - name: regNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Student deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/staff:
    get:
      operationId: getAdminStaff
      tags: [admin]
      summary: List all staff
      responses:
        "200":
          description: List of staff
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffRecord"
    post:
      operationId: createAdminStaff
      tags: [admin]
      summary: Create a new staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffBody"
      responses:
        "201":
          description: Staff created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffRecord"

  /admin/staff/{staffId}:
    get:
      operationId: getAdminStaffMember
      tags: [admin]
      summary: Get a staff member by ID
      parameters:
        - name: staffId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Staff record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffRecord"
    put:
      operationId: updateAdminStaffMember
      tags: [admin]
      summary: Update a staff member
      parameters:
        - name: staffId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStaffBody"
      responses:
        "200":
          description: Staff updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffRecord"
    delete:
      operationId: deleteAdminStaffMember
      tags: [admin]
      summary: Delete a staff member
      parameters:
        - name: staffId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Staff deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/requests:
    get:
      operationId: getAdminRequests
      tags: [admin]
      summary: List all student requests
      responses:
        "200":
          description: List of requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RequestRecord"

  /admin/requests/{id}:
    patch:
      operationId: reviewRequest
      tags: [admin]
      summary: Approve or reject a student request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewRequestBody"
      responses:
        "200":
          description: Request reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestRecord"

  /admin/staff/{staffId}/assigned-class:
    patch:
      operationId: assignStaffClass
      tags: [admin]
      summary: Assign or unassign a class to a teacher (class teacher role)
      parameters:
        - name: staffId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignClassBody"
      responses:
        "200":
          description: Class assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffRecord"

  /admin/exams:
    get:
      operationId: getAdminExams
      tags: [admin]
      summary: List all exams across all staff
      responses:
        "200":
          description: List of exams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamWithStats"

  /admin/exams/{examId}:
    put:
      operationId: updateAdminExam
      tags: [admin]
      summary: Update any exam (admin only)
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExamBody"
      responses:
        "200":
          description: Exam updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exam"
    delete:
      operationId: deleteAdminExam
      tags: [admin]
      summary: Delete any exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exam deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/exams/{examId}/results:
    get:
      operationId: getAdminExamResults
      tags: [admin]
      summary: Get all student results for any exam (admin only)
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResultWithStudent"

  /admin/exams/{examId}/results/{resultId}:
    delete:
      operationId: deleteAdminExamResult
      tags: [admin]
      summary: Remove a student's result (admin only), allows retake
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
        - name: resultId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Result removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    StaffPermissions:
      type: object
      properties:
        manage_exams:
          type: boolean
        view_all_exams:
          type: boolean
        view_all_results:
          type: boolean
        manage_students:
          type: boolean
        reset_student_exam:
          type: boolean
      required: [manage_exams, view_all_exams, view_all_results, manage_students, reset_student_exam]

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [student, staff]
      required: [username, password, role]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        role:
          type: string
          enum: [student, staff, admin]
        name:
          type: string
          nullable: true
        isDefaultPassword:
          type: boolean
        id:
          type: string
        staffRole:
          type: string
          nullable: true
        permissions:
          $ref: "#/components/schemas/StaffPermissions"
          nullable: true
      required: [token, role, name, isDefaultPassword, id]

    UpdateNameBody:
      type: object
      properties:
        name:
          type: string
          minLength: 2
      required: [name]

    CreateRequestBody:
      type: object
      properties:
        type:
          type: string
          enum: [name_change, role_change]
        requestedValue:
          type: string
      required: [type, requestedValue]

    ReviewRequestBody:
      type: object
      properties:
        status:
          type: string
          enum: [approved, rejected]
        reviewNote:
          type: string
          nullable: true
      required: [status]

    AssignClassBody:
      type: object
      properties:
        assignedClass:
          type: string
          nullable: true
      required: [assignedClass]

    RequestRecord:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        userName:
          type: string
        userClass:
          type: string
          nullable: true
        type:
          type: string
          enum: [name_change, role_change]
        currentValue:
          type: string
        requestedValue:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        reviewedBy:
          type: string
          nullable: true
        reviewNote:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
